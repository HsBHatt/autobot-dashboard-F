<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAIM AUTO BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--g:#25D366;--g2:#128C7E;--bg:#080C0A;--card:#0E1511;--card2:#121A14;--border:#1A2E20;--txt:#E4F0E8;--txt2:#6B9B7A;--err:#FF5A5A;--warn:#F5A623;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
#app{display:flex;min-height:100vh;}
#sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;}
#main{margin-left:220px;flex:1;padding:32px 36px;min-height:100vh;}
#content{max-width:860px;margin:0 auto;}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.nav{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--txt2);font-size:13px;margin-bottom:2px;transition:all .15s;}
.nav-item:hover{background:rgba(37,211,102,.08);color:var(--txt);}
.nav-item.active{background:rgba(37,211,102,.12);color:var(--g);font-weight:700;}
.nav-icon{width:18px;text-align:center;font-size:14px;}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--border);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--err);flex-shrink:0;transition:background .3s;}
.status-dot.on{background:var(--g);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:16px;}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.section-title{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px;}
.section-sub{font-size:13px;color:var(--txt2);margin-bottom:24px;}
label{font-size:12px;color:var(--txt2);margin-bottom:6px;display:block;letter-spacing:.3px;text-transform:uppercase;}
input,textarea,select{background:#0A120D;border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:10px 14px;font-family:'Syne',sans-serif;font-size:13px;outline:none;width:100%;transition:border .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--g);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
select option{background:#0A120D;}
.field{margin-bottom:16px;}
button{cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:8px;transition:all .2s;padding:9px 20px;}
.btn-primary{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--txt2);}
.btn-ghost:hover{border-color:var(--g);color:var(--txt);}
.btn-sm{padding:6px 14px;font-size:12px;}
.toggle{width:42px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--g);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;}
.toggle.on::after{left:23px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.row{display:flex;align-items:center;gap:10px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.tag{background:#0A2A14;border:1px solid #1A4A24;color:#4ADE80;border-radius:4px;padding:2px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-val{font-size:22px;font-weight:800;color:var(--g);margin:4px 0;}
.stat-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;}
.stat-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;}
.alert-err{background:#1A0808;border:1px solid rgba(255,90,90,.3);color:var(--err);}
.alert-ok{background:#081A0E;border:1px solid rgba(37,211,102,.3);color:var(--g);}
.alert-warn{background:#1A1208;border:1px solid rgba(245,166,35,.3);color:var(--warn);}
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{width:400px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;}
code{font-family:'JetBrains Mono',monospace;font-size:11px;}
@media(max-width:700px){#sidebar{display:none;}#main{margin-left:0;padding:16px;}.stats-grid{grid-template-columns:1fr 1fr;}.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:32px;">
      <div class="login-icon">💬</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.5px;">SAIM AUTO BOT</div>
      <div style="font-size:12px;color:var(--txt2);margin-top:4px;">WhatsApp × Shopify Dashboard</div>
    </div>
    <div id="login-err" class="alert alert-err" style="display:none;"></div>
    <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="you@store.com" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <div class="field"><label>Password</label><input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-primary" style="width:100%;padding:12px;font-size:14px;" onclick="doLogin()">Sign In →</button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--txt2);">Connected to Railway Bot</div>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <div><div style="font-size:12px;font-weight:700;letter-spacing:1px;">SAIM AUTO BOT</div><div style="font-size:10px;color:var(--txt2);margin-top:1px;">WA × Shopify</div></div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">
      <div class="row" style="margin-bottom:10px;">
        <div class="status-dot" id="wa-dot"></div>
        <span style="font-size:12px;color:var(--txt2);" id="wa-status-text">Checking...</span>
      </div>
      <div style="font-size:12px;color:var(--txt2);cursor:pointer;" onclick="logout()">Sign out →</div>
    </div>
  </div>
  <div id="main"><div id="content"></div></div>
</div>

<script>
const API='https://autobot-pro-production.up.railway.app';
const API_KEY='';
const H={'Content-Type':'application/json','x-api-key':API_KEY};
const get=url=>fetch(API+url,{headers:H}).then(r=>r.json()).catch(()=>null);
const post=(url,d)=>fetch(API+url,{method:'POST',headers:H,body:JSON.stringify(d)}).then(r=>r.json()).catch(()=>null);
const patch=(url,d)=>fetch(API+url,{method:'PATCH',headers:H,body:JSON.stringify(d)}).then(r=>r.json()).catch(()=>null);

let page='dashboard',settings={},status={};

const navItems=[
  {id:'dashboard',icon:'⬡',label:'Dashboard'},
  {id:'connect',icon:'◎',label:'WA Connection'},
  {id:'confirmation',icon:'✓',label:'Order Confirmation'},
  {id:'fulfillment',icon:'→',label:'Fulfillment'},
  {id:'cancellation',icon:'✕',label:'Cancellation'},
  {id:'order-notify',icon:'◈',label:'Order Notifications'},
  {id:'admin-notify',icon:'◉',label:'Admin Alerts'},
  {id:'abandoned',icon:'◫',label:'Abandoned Cart'},
  {id:'templates',icon:'◧',label:'Templates'},
];

function buildNav(){
  document.getElementById('nav').innerHTML=navItems.map(n=>`
    <div class="nav-item${n.id===page?' active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </div>`).join('');
}

function navigate(p){page=p;buildNav();render();}

function doLogin(){
  const e=document.getElementById('login-email').value;
  const p=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!e||!p){err.style.display='block';err.textContent='All fields required.';return;}
  if(p.length<6){err.style.display='block';err.textContent='Password too short.';return;}
  err.style.display='none';
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  init();
}

function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
}

async function init(){
  buildNav();
  [status,settings]=await Promise.all([get('/api/status'),get('/api/settings')]);
  status=status||{};settings=settings||{};
  const on=status.waConnected;
  document.getElementById('wa-dot').className='status-dot'+(on?' on':'');
  document.getElementById('wa-status-text').textContent=on?'WhatsApp Connected':'Not Connected';
  render();
}

function showToast(msg,ok=true){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transition:opacity .3s;';document.body.appendChild(t);}
  t.style.background=ok?'#0A2A14':'#2A0A0A';
  t.style.color=ok?'var(--g)':'var(--err)';
  t.style.border=`1px solid ${ok?'var(--g)':'var(--err)'}40`;
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',3000);
}

async function save(section,data){
  const r=await patch('/api/settings/'+section,data);
  showToast(r?.ok?'✅ Saved!':'❌ Save failed',r?.ok);
}

function render(){
  const c=document.getElementById('content');
  const pages={
    'dashboard':pageDashboard,'connect':pageConnect,
    'confirmation':pageConfirmation,'fulfillment':pageFulfillment,
    'cancellation':pageCancellation,'order-notify':pageOrderNotify,
    'admin-notify':pageAdminNotify,'abandoned':pageAbandoned,'templates':pageTemplates
  };
  c.innerHTML=(pages[page]||pageDashboard)();
}

function pageDashboard(){
  const on=status.waConnected,sh=status.shopifyConfigured;
  return`<div class="section-title">Dashboard</div>
  <div class="section-sub">Live overview of your automation</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">WhatsApp</div><div class="stat-val" style="font-size:16px;color:${on?'var(--g)':'var(--err)'};">${on?'🟢 Live':'🔴 Offline'}</div><div class="stat-sub">Meta Cloud API</div></div>
    <div class="stat-card"><div class="stat-label">Shopify</div><div class="stat-val" style="font-size:16px;color:${sh?'var(--g)':'var(--warn)'};">${sh?'✅ Ready':'⚠ Setup needed'}</div><div class="stat-sub">${sh?'Webhooks active':'Add secret key'}</div></div>
    <div class="stat-card"><div class="stat-label">Phone ID</div><div class="stat-val" style="font-size:14px;">${status.phoneNumberId?'···'+status.phoneNumberId.slice(-6):'—'}</div><div class="stat-sub">Meta verified</div></div>
    <div class="stat-card"><div class="stat-label">Version</div><div class="stat-val" style="font-size:16px;">${status.version||'—'}</div><div class="stat-sub">Railway deployed</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div style="font-weight:700;margin-bottom:14px;">Webhook Endpoints</div>
      ${[['/webhook/whatsapp','Meta WA messages'],['/webhook/shopify/order-created','New orders'],['/webhook/shopify/order-fulfilled','Fulfillments'],['/webhook/shopify/order-cancelled','Cancellations'],['/webhook/shopify/cart-abandoned','Abandoned carts']].map(([p,l])=>`
      <div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:12px;color:var(--txt2);">${l}</span>
        <span class="tag">${p}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:14px;">Quick Actions</div>
      <button class="btn-primary" style="width:100%;margin-bottom:10px;" onclick="testConn()">🔍 Test Connection</button>
      <button class="btn-ghost" style="width:100%;margin-bottom:10px;" onclick="navigate('connect')">📱 WA Status</button>
      <button class="btn-ghost" style="width:100%;" onclick="navigate('templates')">✏️ Edit Templates</button>
      <div id="tr" style="margin-top:12px;"></div>
    </div>
  </div>`;
}

async function testConn(){
  document.getElementById('tr').innerHTML='<span class="spinner"></span> Testing...';
  const s=await get('/api/status');
  document.getElementById('tr').innerHTML=s?.ok
    ?'<div class="alert alert-ok">✅ Railway bot is online!</div>'
    :'<div class="alert alert-err">❌ Cannot reach Railway bot</div>';
  if(s){status=s;}
}

function pageConnect(){
  const on=status.waConnected,sh=status.shopifyConfigured;
  return`<div class="section-title">WhatsApp Connection</div>
  <div class="section-sub">Meta Cloud API — no QR scan needed</div>
  <div class="card" style="max-width:520px;">
    <div class="row" style="margin-bottom:20px;gap:16px;">
      <div style="width:56px;height:56px;background:${on?'#0A2A14':'#1A0A0A'};border:2px solid ${on?'var(--g)':'var(--err)'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">💬</div>
      <div>
        <div style="font-weight:700;color:${on?'var(--g)':'var(--err)'};font-size:16px;">${on?'Connected':'Not Connected'}</div>
        <div style="font-size:12px;color:var(--txt2);">Meta WhatsApp Cloud API</div>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:16px;">
      ${[['Phone ID',status.phoneNumberId?'···'+status.phoneNumberId.slice(-6):'Not set'],['Status',on?'Active':'Inactive'],['Shopify',sh?'Configured':'⚠ Missing'],['Server',status.ok?'Online':'Offline']].map(([k,v])=>`
      <div style="background:#080E0A;border-radius:8px;padding:10px 14px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">${k}</div>
        <div style="font-size:13px;font-weight:700;color:var(--g);margin-top:2px;">${v}</div>
      </div>`).join('')}
    </div>
    ${!sh?'<div class="alert alert-warn">⚠ Add <code>SHOPIFY_WEBHOOK_SECRET</code> to Railway Variables</div>':''}
    <div style="border-top:1px solid var(--border);padding-top:16px;">
      <div style="font-weight:700;margin-bottom:12px;">Send test message</div>
      <div class="field"><label>Phone</label><input id="tp" placeholder="+92 300 1234567" /></div>
      <div class="field"><label>Message</label><input id="tm" placeholder="Hello from AutoBot! 👋" /></div>
      <div class="row">
        <button class="btn-primary" onclick="sendTest()">Send →</button>
        <span id="tr2" style="font-size:13px;"></span>
      </div>
    </div>
  </div>
  <div class="card" style="max-width:520px;">
    <div style="font-weight:700;margin-bottom:12px;">Required Railway Variables</div>
    ${[['WA_PHONE_NUMBER_ID','Meta Business → WhatsApp → API Setup'],['WA_ACCESS_TOKEN','Permanent token from Meta System User'],['WA_VERIFY_TOKEN','Any string — match in Meta webhook config'],['SHOPIFY_WEBHOOK_SECRET','Shopify → Settings → Notifications → Webhooks'],['API_KEY','Random string to protect this dashboard']].map(([k,v])=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;">
      <code style="color:var(--g);min-width:190px;">${k}</code>
      <span style="font-size:12px;color:var(--txt2);">${v}</span>
    </div>`).join('')}
  </div>`;
}

async function sendTest(){
  const p=document.getElementById('tp').value,m=document.getElementById('tm').value,r=document.getElementById('tr2');
  if(!p||!m){r.style.color='var(--err)';r.textContent='Fill both fields';return;}
  r.textContent='Sending...';
  const res=await post('/api/wa/test',{phone:p,message:m});
  r.style.color=res?.ok?'var(--g)':'var(--err)';
  r.textContent=res?.ok?'✅ Sent!':'❌ '+(res?.error||'Failed');
}

function pageConfirmation(){
  const c=settings.confirmation||{};
  const ps=c.paymentStatuses||{};
  return`<div class="section-title">Order Confirmation</div>
  <div class="section-sub">Send messages to confirm orders</div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:20px;">
      <div><div style="font-weight:700;">Confirmation Messages</div><div style="font-size:12px;color:var(--txt2);">Send after order is placed</div></div>
      <div class="toggle${c.enabled!==false?' on':''}" id="ce" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="grid2" style="margin-bottom:16px;">
      <div class="field"><label>Delay (minutes)</label><input type="number" id="cd" value="${c.delayMinutes||5}" min="0" /></div>
      <div class="field"><label>Payment status</label>
        <div class="row" style="margin-top:8px;gap:16px;flex-wrap:wrap;">
          ${['paid','pending','cod'].map(s=>`<label class="row" style="gap:6px;cursor:pointer;text-transform:none;font-size:13px;"><input type="checkbox" id="c${s}" ${ps[s]!==false&&s!=='cod'?'checked':''} style="width:auto;accent-color:var(--g);" />${s}</label>`).join('')}
        </div>
      </div>
    </div>
    <div class="field"><label>Message template</label>
      <textarea id="cm" rows="5">${c.message||'Hello {customer_name}! Your order #{order_number} for {amount} has been placed.'}</textarea>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">{customer_name} {order_number} {amount} {store_name}</div>
    </div>
    <button class="btn-primary" onclick="save('confirmation',{enabled:document.getElementById('ce').classList.contains('on'),delayMinutes:+document.getElementById('cd').value,message:document.getElementById('cm').value,paymentStatuses:{paid:document.getElementById('cpaid').checked,pending:document.getElementById('cpending').checked,cod:document.getElementById('ccod').checked}})">Save Settings</button>
  </div>`;
}

function pageFulfillment(){
  const f=settings.fulfillment||{};
  return`<div class="section-title">Fulfillment</div>
  <div class="section-sub">Notify customers when order ships</div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:20px;">
      <div style="font-weight:700;">Fulfillment Notifications</div>
      <div class="toggle${f.enabled!==false?' on':''}" id="fe" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="field"><label>Trigger</label>
      <select id="ft">
        <option value="on_fulfillment" ${(f.trigger||'on_fulfillment')==='on_fulfillment'?'selected':''}>When order is fulfilled</option>
        <option value="on_tracking" ${f.trigger==='on_tracking'?'selected':''}>When tracking number added</option>
      </select>
    </div>
    <div class="field"><label>Message template</label>
      <textarea id="fm" rows="5">${f.message||'Hi {customer_name}! Your order #{order_number} has shipped! Tracking: {tracking_number} 📦'}</textarea>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">{customer_name} {order_number} {tracking_number} {carrier} {delivery_date}</div>
    </div>
    <button class="btn-primary" onclick="save('fulfillment',{enabled:document.getElementById('fe').classList.contains('on'),trigger:document.getElementById('ft').value,message:document.getElementById('fm').value})">Save Settings</button>
  </div>`;
}

function pageCancellation(){
  const c=settings.cancellation||{};
  return`<div class="section-title">Cancellation</div>
  <div class="section-sub">Notify when orders are cancelled</div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:20px;">
      <div style="font-weight:700;">Cancellation Notifications</div>
      <div class="toggle${c.enabled!==false?' on':''}" id="can-e" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="row" style="gap:24px;margin-bottom:20px;">
      <label class="row" style="gap:8px;cursor:pointer;text-transform:none;font-size:13px;"><input type="checkbox" id="can-cu" ${c.notifyCustomer!==false?'checked':''} style="width:auto;accent-color:var(--g);" /> Notify customer</label>
      <label class="row" style="gap:8px;cursor:pointer;text-transform:none;font-size:13px;"><input type="checkbox" id="can-ad" ${c.notifyAdmin!==false?'checked':''} style="width:auto;accent-color:var(--g);" /> Notify admin</label>
    </div>
    <div class="field"><label>Message template</label>
      <textarea id="can-m" rows="6">${c.message||'Hi {customer_name}, your order #{order_number} was cancelled. Reason: {cancel_reason}. Refund: {refund_amount} in 3-5 days.'}</textarea>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">{customer_name} {order_number} {cancel_reason} {refund_amount}</div>
    </div>
    <button class="btn-primary" onclick="save('cancellation',{enabled:document.getElementById('can-e').classList.contains('on'),notifyCustomer:document.getElementById('can-cu').checked,notifyAdmin:document.getElementById('can-ad').checked,message:document.getElementById('can-m').value})">Save Settings</button>
  </div>`;
}

function pageOrderNotify(){
  const on=settings.orderNotifications||{};
  const evs=[{id:'placed',label:'Order Placed'},{id:'paid',label:'Payment Received'},{id:'fulfilled',label:'Order Fulfilled'},{id:'delivered',label:'Order Delivered'},{id:'refunded',label:'Refund Processed'}];
  return`<div class="section-title">Order Notifications</div>
  <div class="section-sub">Automated messages for each event</div>
  ${evs.map(ev=>{const c=on[ev.id]||{};return`
  <div class="card">
    <div class="flex-between" style="cursor:pointer;" onclick="toggleAcc('a${ev.id}','ar${ev.id}')">
      <div class="row" style="gap:12px;">
        <div class="toggle${c.enabled!==false?' on':''}" id="on-${ev.id}" onclick="event.stopPropagation();this.classList.toggle('on')"></div>
        <span style="font-weight:700;">${ev.label}</span>
      </div>
      <span id="ar${ev.id}" style="color:var(--txt2);">▼</span>
    </div>
    <div id="a${ev.id}" style="display:none;margin-top:16px;">
      <div class="field"><label>Message</label><textarea id="onm-${ev.id}" rows="3">${c.message||''}</textarea></div>
      <button class="btn-primary btn-sm" onclick="saveON('${ev.id}')">Save</button>
    </div>
  </div>`;}).join('')}`;
}

function toggleAcc(id,aid){
  const el=document.getElementById(id),ar=document.getElementById(aid);
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  ar.textContent=open?'▼':'▲';
}

async function saveON(evId){
  const current=settings.orderNotifications||{};
  current[evId]={enabled:document.getElementById('on-'+evId).classList.contains('on'),message:document.getElementById('onm-'+evId).value};
  const r=await patch('/api/settings/orderNotifications',current);
  showToast(r?.ok?'✅ Saved!':'❌ Failed',r?.ok);
}

function pageAdminNotify(){
  const a=settings.adminNotifications||{},ev=a.events||{};
  return`<div class="section-title">Admin Alerts</div>
  <div class="section-sub">Get WhatsApp alerts on your number</div>
  <div class="card">
    <div class="field"><label>Admin WhatsApp number</label><input id="ap" value="${a.adminPhone||''}" placeholder="+92 300 0000000" /></div>
    <div style="font-weight:700;margin-bottom:14px;">Alert me when:</div>
    ${[['new_order','New order placed'],['cancellation','Order cancelled'],['failed_payment','Payment fails'],['low_stock','Stock low'],['new_review','New review']].map(([k,l])=>`
    <div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:14px;">${l}</span>
      <div class="toggle${ev[k]?' on':''}" id="ae-${k}" onclick="this.classList.toggle('on')"></div>
    </div>`).join('')}
    <div style="margin-top:16px;">
      <button class="btn-primary" onclick="saveAdmin()">Save Admin Settings</button>
    </div>
  </div>`;
}

async function saveAdmin(){
  await save('adminNotifications',{
    adminPhone:document.getElementById('ap').value,
    events:{new_order:document.getElementById('ae-new_order').classList.contains('on'),cancellation:document.getElementById('ae-cancellation').classList.contains('on'),failed_payment:document.getElementById('ae-failed_payment').classList.contains('on'),low_stock:document.getElementById('ae-low_stock').classList.contains('on'),new_review:document.getElementById('ae-new_review').classList.contains('on')}
  });
}

function pageAbandoned(){
  const a=settings.abandonedCart||{},fu=a.followUp||{};
  return`<div class="section-title">Abandoned Cart</div>
  <div class="section-sub">Recover lost sales automatically</div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:20px;">
      <div style="font-weight:700;">Cart Recovery</div>
      <div class="toggle${a.enabled!==false?' on':''}" id="cart-e" onclick="this.classList.toggle('on')"></div>
    </div>
    <div class="grid2" style="margin-bottom:16px;">
      <div class="field"><label>First message delay (min)</label><input type="number" id="cart-d" value="${a.firstMessageDelayMinutes||60}" /></div>
      <div class="field"><label>Discount code (optional)</label><input id="cart-c" value="${a.discountCode||''}" placeholder="SAVE10" /></div>
    </div>
    <div class="field"><label>First message</label>
      <textarea id="cart-m1" rows="4">${a.firstMessage||'Hey {customer_name}! Your cart is waiting 🛒 {checkout_url}'}</textarea>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">{customer_name} {cart_items} {cart_total} {checkout_url}</div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px;">
      <div class="flex-between" style="margin-bottom:12px;">
        <div><div style="font-weight:700;">Follow-up</div><div style="font-size:12px;color:var(--txt2);">Second reminder</div></div>
        <div class="toggle${fu.enabled?' on':''}" id="cart-fu" onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="field"><label>Follow-up delay (min)</label><input type="number" id="cart-fd" value="${fu.delayMinutes||1440}" /></div>
      <div class="field"><label>Follow-up message</label><textarea id="cart-m2" rows="3">${fu.message||'Last chance! {checkout_url} 🔥'}</textarea></div>
    </div>
    <button class="btn-primary" onclick="saveCart()">Save Cart Recovery</button>
  </div>`;
}

async function saveCart(){
  await save('abandonedCart',{
    enabled:document.getElementById('cart-e').classList.contains('on'),
    firstMessageDelayMinutes:+document.getElementById('cart-d').value,
    discountCode:document.getElementById('cart-c').value,
    firstMessage:document.getElementById('cart-m1').value,
    followUp:{enabled:document.getElementById('cart-fu').classList.contains('on'),delayMinutes:+document.getElementById('cart-fd').value,message:document.getElementById('cart-m2').value}
  });
}

function pageTemplates(){
  const c=settings.confirmation||{},f=settings.fulfillment||{},ca=settings.cancellation||{},ab=settings.abandonedCart||{},on=settings.orderNotifications||{};
  const tpls=[
    {name:'Order Confirmation',id:'t1',val:c.message||''},
    {name:'Fulfillment / Shipped',id:'t2',val:f.message||''},
    {name:'Cancellation',id:'t3',val:ca.message||''},
    {name:'Cart Recovery #1',id:'t4',val:ab.firstMessage||''},
    {name:'Cart Recovery #2',id:'t5',val:(ab.followUp||{}).message||''},
    {name:'Order Placed',id:'t6',val:(on.placed||{}).message||''},
    {name:'Payment Received',id:'t7',val:(on.paid||{}).message||''},
  ];
  return`<div class="section-title">Templates</div>
  <div class="section-sub">Edit all message templates in one place</div>
  ${tpls.map(t=>`
  <div class="card">
    <div style="font-weight:700;margin-bottom:10px;">${t.name}</div>
    <textarea id="${t.id}" rows="3">${t.val}</textarea>
    <div style="margin-top:10px;"><button class="btn-primary btn-sm" onclick="saveTpl('${t.id}')">Save</button></div>
  </div>`).join('')}`;
}

async function saveTpl(id){
  const val=document.getElementById(id).value;
  const map={t1:['confirmation','message'],t2:['fulfillment','message'],t3:['cancellation','message'],t4:['abandonedCart','firstMessage']};
  if(map[id]){
    const [s,k]=map[id];await save(s,{[k]:val});
  } else if(id==='t5'){
    const ab=settings.abandonedCart||{};ab.followUp=ab.followUp||{};ab.followUp.message=val;
    await save('abandonedCart',ab);
  } else if(id==='t6'){
    const on=settings.orderNotifications||{};on.placed=on.placed||{};on.placed.message=val;
    await save('orderNotifications',on);
  } else if(id==='t7'){
    const on=settings.orderNotifications||{};on.paid=on.paid||{};on.paid.message=val;
    await save('orderNotifications',on);
  }
}
</script>
</body>
</html>
